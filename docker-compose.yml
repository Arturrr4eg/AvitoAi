services:
  server:
    build:
      context: ./server
    container_name: avito-server
    ports:
      - "8080:8080"
    environment:
      PORT: 8080

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_OPENROUTER_API_KEY: ${VITE_OPENROUTER_API_KEY}
        VITE_OPENROUTER_MODEL: ${VITE_OPENROUTER_MODEL:-openai/gpt-4o-mini}
        VITE_LLM_PROXY_URL: ${VITE_LLM_PROXY_URL:-}
    container_name: avito-frontend
    depends_on:
      - server
    ports:
      - "3000:80"
